name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install -r api/requirements.txt

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint web
        run: npx nx lint web

  build-push-api:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-api:latest
            ghcr.io/${{ github.repository }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-api:
    needs: build-push-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Encode compose file
        run: echo "COMPOSE_B64=$(base64 -w 0 docker-compose.prod.yml)" >> $GITHUB_ENV

      - uses: appleboy/ssh-action@v1
        env:
          GCHR_TOKEN: ${{ secrets.GCHR_TOKEN }}
          COMPOSE_B64: ${{ env.COMPOSE_B64 }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GCHR_TOKEN,COMPOSE_B64
          script: |
            echo "$COMPOSE_B64" | base64 -d > ${{ secrets.VPS_DEPLOY_PATH }}/docker-compose.prod.yml
            echo "$GCHR_TOKEN" | docker login ghcr.io -u eskres --password-stdin
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d api

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 24); do
            echo "Attempt $i..."
            curl -sf -X POST ${{ secrets.NEXT_PUBLIC_API_URL }} \
              -H "Content-Type: application/json" \
              -d '{"query":"{ __typename }"}' -o /dev/null && echo "API is up" && exit 0
            sleep 5
          done
          echo "API did not become healthy in time" && exit 1

  build-push-web:
    needs: deploy-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-web:latest
            ghcr.io/${{ github.repository }}-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-web:
    needs: build-push-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Encode compose file
        run: echo "COMPOSE_B64=$(base64 -w 0 docker-compose.prod.yml)" >> $GITHUB_ENV

      - uses: appleboy/ssh-action@v1
        env:
          GCHR_TOKEN: ${{ secrets.GCHR_TOKEN }}
          COMPOSE_B64: ${{ env.COMPOSE_B64 }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GCHR_TOKEN,COMPOSE_B64
          script: |
            echo "$COMPOSE_B64" | base64 -d > ${{ secrets.VPS_DEPLOY_PATH }}/docker-compose.prod.yml
            echo "$GCHR_TOKEN" | docker login ghcr.io -u eskres --password-stdin
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            docker compose -f docker-compose.prod.yml pull web
            docker compose -f docker-compose.prod.yml up -d web
            docker image prune -f
