services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal4
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/${GITHUB_REPOSITORY}-api:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    networks:
      - internal
      - traefik_proxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.f1-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/graphql`)"
      - "traefik.http.routers.f1-api.entrypoints=websecure"
      - "traefik.http.routers.f1-api.tls=true"
      - "traefik.http.services.f1-api.loadbalancer.server.port=8000"

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}-web:latest
    environment:
      GRAPHQL_URL: http://api:8000/graphql
      API_BASE_URL: http://api:8000
    networks:
      - internal
      - traefik_proxy
    depends_on:
      - api
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.f1-web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.f1-web.entrypoints=websecure"
      - "traefik.http.routers.f1-web.tls=true"
      - "traefik.http.services.f1-web.loadbalancer.server.port=3000"

networks:
  internal:
  traefik_proxy:
    external: true

volumes:
  postgres_data:
  redis_data:
